<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <h2>Reset Password</h2>
    <p class="subtitle">Enter the OTP and your new password.</p>
    
    <form id="reset-form">
      <div class="form-group">
        <label>6-Digit OTP</label>
        <input type="text" id="otp" class="form-control" maxlength="6" required>
      </div>
      <div class="form-group">
        <label>New Password</label>
        <input type="password" id="newPassword" class="form-control" required>
      </div>
      <div class="form-group">
        <label>Confirm New Password</label>
        <input type="password" id="confirmPassword" class="form-control" required>
      </div>
      <button type="submit" id="submit-btn" class="btn">
        <span class="btn-text">Reset Password</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>

  <script>
    const email = localStorage.getItem('resetEmail');
    if(!email) window.location.href = 'forgot-password.html';

    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.classList.add('loading');
      
      const payload = {
        email,
        otp: document.getElementById('otp').value,
        newPassword: document.getElementById('newPassword').value,
        confirmPassword: document.getElementById('confirmPassword').value
      };

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          alert('Password Reset Successfully! Please login.');
          localStorage.removeItem('resetEmail');
          window.location.href = 'login.html';
        } else {
          alert('Failed to reset password. OTP may be invalid.');
        }
      } catch (err) {
        alert('Network Error');
      } finally {
        btn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
