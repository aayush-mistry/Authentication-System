<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <div class="auth-container">
    <h2>Reset Password</h2>
    <p class="subtitle">Enter the OTP and your new password.</p>
    
    <form id="reset-form">
      <div class="form-group">
        <label>6-Digit OTP</label>
        <input type="text" id="otp" class="form-control" maxlength="6" required>
      </div>
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <div class="password-wrapper">
          <input type="password" id="newPassword" class="form-control" required>
          <button type="button" class="toggle-password" data-password-toggle="newPassword" aria-label="Show password" title="Show password">
            <i class="fas fa-eye"></i>
          </button>
        </div>

        <div id="common-password-warning" class="password-warning" aria-live="polite">
          <div class="password-warning-title">Common Password Detected</div>
          <ul>
            <li>Use at least 12 characters.</li>
            <li>Include uppercase and lowercase letters.</li>
            <li>Include numbers and special characters.</li>
            <li>Avoid common words and predictable patterns.</li>
          </ul>
          <div class="suggestion-title">Secure alternatives</div>
          <div id="common-password-suggestions" class="password-suggestions"></div>
        </div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm New Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" class="form-control" required>
          <button type="button" class="toggle-password" data-password-toggle="confirmPassword" aria-label="Show password" title="Show password">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <span id="confirm-feedback" class="feedback-text" aria-live="polite"></span>
      </div>
      <button type="submit" id="submit-btn" class="btn">
        <span class="btn-text">Reset Password</span>
        <div class="spinner"></div>
      </button>
    </form>
  </div>

  <script src="js/passwordPolicy.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
