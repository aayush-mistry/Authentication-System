<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Login - Auth System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <div class="auth-container">
    <h2>Verify This Login</h2>
    <p class="subtitle">We noticed a higher-risk login. Enter the OTP sent to your email.</p>

    <div id="risk-summary" class="security-alert" style="display:none;"></div>

    <form id="risk-verify-form">
      <div class="form-group">
        <label for="otp">Email OTP</label>
        <input type="text" id="otp" class="form-control" maxlength="6" inputmode="numeric" required>
      </div>
      <button type="submit" id="verify-login-btn" class="btn">
        <span class="btn-text">Verify Login</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="auth-links">
      <a href="login.html">Back to Login</a>
    </div>
  </div>

  <script src="js/verify-login.js"></script>
</body>
</html>
