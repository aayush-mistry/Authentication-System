<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - Auth System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="toast-container" class="toast-container"></div>

  <div class="auth-container">
    <h2>Verify Your Email</h2>
    <p class="subtitle">Enter the 6-digit OTP sent to your email.</p>
    
    <div class="otp-timer">
      <span id="timer-display">01:00</span>
    </div>

    <form id="verify-form">
      <div class="form-group">
        <label for="otp">One-Time Password</label>
        <input type="text" id="otp" class="form-control" placeholder="123456" maxlength="6" pattern="\d{6}" title="Please enter a 6 digit number" required style="text-align: center; font-size: 1.5rem; letter-spacing: 4px;">
      </div>

      <button type="submit" id="verify-btn" class="btn">
        <span class="btn-text">Verify Email</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="auth-links" style="margin-top: 15px;">
      <button id="resend-btn" class="btn" style="background: transparent; border: 1px solid var(--glass-border); color: var(--text-main); display: none;">
        Resend OTP
      </button>
    </div>
  </div>

  <script src="js/verify.js"></script>
</body>
</html>
