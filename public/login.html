<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Auth System</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <div class="auth-container">
    <h2>Welcome Back</h2>
    <p class="subtitle">Log in to your account to continue</p>
    
    <form id="login-form">
      <div class="form-group">
        <label for="loginId">Username or Email</label>
        <input type="text" id="loginId" class="form-control" placeholder="Enter username or email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
          <button type="button" class="toggle-password" data-password-toggle="password" aria-label="Show password" title="Show password">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div style="text-align: right; margin-top: 8px;">
          <a href="forgot-password.html" style="color: var(--primary-color); font-size: 0.8rem; text-decoration: none;">Forgot Password?</a>
        </div>
      </div>

      <button type="submit" id="login-btn" class="btn">
        <span class="btn-text">Log In</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="oauth-divider" aria-hidden="true">
      <span></span>
      <strong>OR</strong>
      <span></span>
    </div>

    <div class="social-login" aria-label="Social login options">
      <a class="oauth-btn google" href="/api/auth/google" data-provider="google" aria-label="Continue with Google">
        <span class="oauth-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06L5.84 9.9C6.71 7.3 9.14 5.38 12 5.38z"/>
          </svg>
        </span>
        <span class="oauth-label">Continue with Google</span>
        <span class="oauth-spinner"></span>
      </a>

      <a class="oauth-btn facebook" href="/api/auth/facebook" data-provider="facebook" aria-label="Continue with Facebook">
        <span class="oauth-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path fill="currentColor" d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.313 0 2.686.236 2.686.236v2.97h-1.513c-1.49 0-1.956.93-1.956 1.884v2.27h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
          </svg>
        </span>
        <span class="oauth-label">Continue with Facebook</span>
        <span class="oauth-spinner"></span>
      </a>

      <a class="oauth-btn linkedin" href="/api/auth/linkedin" data-provider="linkedin" aria-label="Continue with LinkedIn">
        <span class="oauth-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false">
            <path fill="currentColor" d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.849-3.037-1.851 0-2.134 1.445-2.134 2.939v5.667H9.356V9h3.414v1.561h.049c.476-.9 1.637-1.849 3.368-1.849 3.602 0 4.267 2.371 4.267 5.455v6.285h-.007zM5.337 7.433a2.063 2.063 0 1 1 0-4.126 2.063 2.063 0 0 1 0 4.126zM7.119 20.452H3.554V9h3.565v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.226.792 24 1.771 24h20.451C23.2 24 24 23.226 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
        </span>
        <span class="oauth-label">Continue with LinkedIn</span>
        <span class="oauth-spinner"></span>
      </a>
    </div>

    <div class="auth-links">
      Don't have an account? <a href="register.html">Sign Up</a>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
